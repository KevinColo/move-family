<h1>Récompenses</h1>

<div class="streak-box">
  <p class="streak-value">{{ streak }}</p>
  <p class="streak-label">jour(s) d'affilée</p>
</div>

<p class="total-days">{{ totalDays }} séance(s) au total</p>

<h2>Badges</h2>

<ul class="badge-list">
  @for (badge of badges; track badge.id) {
    <li class="badge" [class.unlocked]="badge.unlocked">
      <span class="badge-icon">{{ badge.unlocked ? '&#11088;' : '&#128274;' }}</span>
      <span class="badge-label">{{ badge.label }}</span>
    </li>
  }
</ul>
