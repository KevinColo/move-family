@if (!hasSteps()) {
  <p>Aucune étape</p>
} @else {
  <div class="box">
    <div class="progress">Étape {{ stepNumber() }} / {{ total() }}</div>
    <div class="label">{{ currentLabel() }}</div>
    <div class="time">{{ remaining() }}</div>

    <div class="actions">
      @if (!running() && remaining() === 0) {
        <button class="btn" (click)="start()">Démarrer</button>
      } @else if (running()) {
        <button class="btn" (click)="pause()">Pause</button>
      } @else {
        <button class="btn" (click)="start()">Reprendre</button>
      }
      <button class="btn secondary" (click)="reset()">Reset</button>
    </div>
  </div>
}
